<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก | GB MoneyShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 500px;
            margin: 4rem auto;
            background: var(--bg-surface);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            animation: fadeIn 0.5s ease;
        }
        .image-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 2px dashed var(--border-color);
            margin: 0 auto 1.5rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo">GB<span>money</span></a>
    </div>
    <div class="nav-center">
        <a href="index.html" class="nav-link">หน้าแรก</a>
        <a href="products.html" class="nav-link">ตลาดสินค้า</a>
        <a href="contact.html" class="nav-link">ติดต่อเรา</a>
    </div>
    <div class="nav-right" id="nav-auth-container">
        <!-- Injected via JS -->
    </div>
</nav>

    <main class="container">
        <div class="auth-container">
            <h2 class="text-center" style="margin-bottom: 2rem;">สมัครสมาชิกใหม่</h2>
            
            <form id="registerForm">
                <div class="text-center">
                    <label for="profileImage" style="cursor: pointer;">
                        <div class="image-preview" id="previewContainer">
                            <span style="color:var(--text-muted); font-size:0.8rem; padding: 10px;">คลิกเพื่อเพิ่ม<br>รูปโปรไฟล์</span>
                            <img id="previewImage" alt="ตัวอย่างรูป">
                        </div>
                    </label>
                    <input type="file" id="profileImage" accept="image/*" style="display: none;">
                </div>

                <div class="form-group">
                    <label>ชื่อผู้ใช้</label>
                    <input type="text" id="username" class="form-control" required placeholder="เลือกชื่อผู้ใช้">
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <!-- Mock QR Promtpay for Optional feature visual -->
                <div class="form-group" style="padding: 1rem; border: 1px solid var(--primary); border-radius: 8px; background: rgba(255,0,60,0.05);">
                    <label style="color:var(--primary); font-weight:bold;">ตั้งค่าเพิ่มเติม: พร้อมเพย์ (ไม่บังคับ)</label>
                    <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom: 0.5rem;">เชื่อมต่อพร้อมเพย์เพื่อรับเงินได้รวดเร็วขึ้น</p>
                    <input type="text" class="form-control" placeholder="หมายเลขพร้อมเพย์ / เบอร์โทร">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="regBtn">สร้างบัญชีใหม่</button>
            </form>
            <div class="text-center mt-2" style="font-size: 0.9rem; color: var(--text-muted);">
                มีบัญชีแล้ว? <a href="login.html" style="color: var(--primary);">เข้าสู่ระบบ</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        const imageInput = document.getElementById('profileImage');
        const previewImage = document.getElementById('previewImage');
        const previewText = document.querySelector('#previewContainer span');

        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    previewImage.style.display = 'block';
                    previewText.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.innerText = 'กำลังสร้างบัญชี...';
            btn.disabled = true;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const file = imageInput.files[0];

            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);
            if (file) {
                formData.append('profile_image', file);
            }

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                showToast('สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (err) {
                showToast(err.message, 'error');
                btn.innerText = 'สร้างบัญชีใหม่';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
