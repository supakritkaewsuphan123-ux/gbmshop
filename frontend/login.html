<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | GB MoneyShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
            background: var(--bg-surface);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo">GB<span>money</span></a>
    </div>
    <div class="nav-center">
        <a href="index.html" class="nav-link">หน้าแรก</a>
        <a href="products.html" class="nav-link">ตลาดสินค้า</a>
        <a href="contact.html" class="nav-link">ติดต่อเรา</a>
    </div>
    <div class="nav-right" id="nav-auth-container">
        <!-- Injected via JS -->
    </div>
</nav>

    <main class="container">
        <div class="auth-container">
            <h2 class="text-center" style="margin-bottom: 2rem;">ยินดีต้อนรับกลับมา</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>ชื่อผู้ใช้</label>
                    <input type="text" id="username" class="form-control" required placeholder="ใส่ชื่อผู้ใช้">
                </div>
                <div class="form-group">
                    <label>รหัสผ่าน</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="loginBtn">เข้าสู่ระบบ</button>
            </form>
            <div class="text-center mt-2" style="font-size: 0.9rem; color: var(--text-muted);">
                ยังไม่มีบัญชี? <a href="register.html" style="color: var(--primary);">สมัครสมาชิก</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerText = 'กำลังเข้าสู่ระบบ...';
            btn.disabled = true;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                showToast('เข้าสู่ระบบสำเร็จ!', 'success');
                setTimeout(() => {
                    window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
                }, 1000);

            } catch (err) {
                showToast(err.message, 'error');
                btn.innerText = 'เข้าสู่ระบบ';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
