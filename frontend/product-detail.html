<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดสินค้า | GB MoneyShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            background: var(--bg-surface);
            padding: 2rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            margin-top: 3rem;
        }
        .detail-image {
            width: 100%;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
        }
        .detail-image img {
            width: 100%;
            object-fit: contain;
            max-height: 500px;
        }
        .detail-info {
            display: flex;
            flex-direction: column;
        }
        .condition-badge {
            display: inline-block;
            background: rgba(255,0,60,0.1);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 1rem;
            border: 1px solid var(--primary);
        }
        .price {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 1rem 0;
            color: var(--text-main);
        }
        .seller-card {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .seller-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }
        @media (max-width: 768px) {
            .detail-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-logo">GB<span>money</span></a>
    </div>
    <div class="nav-center">
        <a href="index.html" class="nav-link">หน้าแรก</a>
        <a href="products.html" class="nav-link">ตลาดสินค้า</a>
        <a href="contact.html" class="nav-link">ติดต่อเรา</a>
    </div>
    <div class="nav-right" id="nav-auth-container">
        <!-- Injected via JS -->
    </div>
</nav>

    <main class="container">
        <div class="detail-container" id="product-detail">
            <!-- Injected via JS -->
            <h2 style="grid-column: 1/-1; text-align: center;">กำลังโหลดข้อมูลสินค้า...</h2>
        </div>
    </main>

    <!-- Payment Choice Modal -->
    <div class="modal-overlay" id="paymentModal">
        <div class="modal-content" id="paymentModalContent">
            <!-- Modal Content Injected via JS -->
            <h3 class="text-center" style="margin-bottom: 2rem;">เลือกวิธีชำระเงิน</h3>
            <div style="display:flex; flex-direction:column; gap:1rem;">
                <button class="btn btn-outline" id="btnMeetup" style="padding:1rem;">🤝 นัดรับสินค้า</button>
                <button class="btn btn-primary" id="btnPayNow" style="padding:1rem;">📱 ชำระผ่าน QR</button>
                <button class="btn" style="padding:1rem; border:none; background:transparent; color:var(--text-muted);" onclick="closeModal()">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const container = document.getElementById('product-detail');

            if (!id) {
                container.innerHTML = '<h2 style="grid-column: 1/-1; text-align: center;">ไม่พบสินค้า</h2>';
                return;
            }

            try {
                const product = await apiFetch(`/products/${id}`);
                const imageUrl = product.image.startsWith('http') ? product.image : `/uploads/${product.image}`;
                const avatarUrl = product.seller_image.startsWith('http') || product.seller_image === 'default_avatar.png' 
                    ? (product.seller_image === 'default_avatar.png' ? 'https://via.placeholder.com/50' : product.seller_image) 
                    : `/uploads/${product.seller_image}`;

                // Check if it's the user's own product to disable buy button
                const isOwnProduct = currentUser && currentUser.id === product.user_id;

                container.innerHTML = `
                    <div class="detail-image">
                        <img src="${imageUrl}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/500?text=No+Image'">
                    </div>
                    <div class="detail-info">
                        <span class="condition-badge">สภาพสินค้า: ${product.condition_percent}%</span>
                        <h1>${product.name}</h1>
                        <div class="price">฿${product.price.toLocaleString()}</div>
                        <div style="color:${product.stock <= 0 ? 'red' : 'green'}; font-weight:bold; margin-bottom: 1rem;">
                            ${product.stock <= 0 ? 'หมดสต็อก' : `สต็อก: ${product.stock} ชิ้น`}
                        </div>
                        <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.8; margin-bottom: 2rem;">
                            ${product.description || 'ไม่มีคำอธิบายสินค้า'}
                        </p>
                        
                        <button class="btn btn-primary" id="buyBtn" style="width: 100%; font-size: 1.2rem; padding: 1rem; margin-bottom: 0.5rem;" ${isOwnProduct || product.stock <= 0 ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''}>
                            ${isOwnProduct ? 'สินค้าของคุณ' : (product.stock <= 0 ? 'หมดสต็อก' : 'ซื้อเลย')}
                        </button>
                        
                        ${!isOwnProduct ? `<button class="btn btn-outline" id="cartBtn" style="width: 100%; font-size: 1.2rem; padding: 1rem;" ${product.stock <= 0 ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''}>🛒 เพิ่มลงตะกร้า</button>` : ''}

                        
                        <div class="seller-card">
                            <img src="${avatarUrl}" class="seller-avatar" alt="ผู้ขาย">
                            <div>
                                <div style="font-size: 0.9rem; color: var(--text-muted)">ลงขายโดย</div>
                                <div style="font-weight: 600;">${product.seller_name}</div>
                            </div>
                        </div>
                    </div>
                `;

                let selectedProduct = product;

                if (!isOwnProduct) {
                    document.getElementById('buyBtn').addEventListener('click', () => {
                        if (!currentUser) {
                            showToast('กรุณาเข้าสู่ระบบก่อนซื้อสินค้า', 'error');
                            setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                            return;
                        }
                        
                        // Open Method Selection Modal
                        const modal = document.getElementById('paymentModal');
                        modal.classList.add('active');
                    });

                    document.getElementById('cartBtn').addEventListener('click', () => {
                        addToCart({
                            id: product.id,
                            name: product.name,
                            price: product.price,
                            image: product.image
                        });
                    });
                }
            } catch (err) {
                container.innerHTML = '<h2 style="grid-column: 1/-1; text-align: center; color: red;">ข้อผิดพลาด: ' + err.message + '</h2>';
            }
        });

        const modal = document.getElementById('paymentModal');
        function closeModal() {
            modal.classList.remove('active');
            // reset content
            document.getElementById('paymentModalContent').innerHTML = `
                <h3 class="text-center" style="margin-bottom: 2rem;">เลือกวิธีจัดส่ง / ชำระเงิน</h3>
                <div style="display:flex; flex-direction:column; gap:1rem;">
                    <button class="btn btn-outline" onclick="placeOrder('meetup')" style="padding:1rem;">🤝 นัดรับสินค้า (Meetup)</button>
                    <button class="btn btn-outline" onclick="showAngpao()" style="padding:1rem; border-color:#ff003c; color:#ff003c;">🧧 จ่ายผ่านอั่งเปา TrueMoney</button>
                    <button class="btn btn-primary" onclick="showQR()" style="padding:1rem;">📱 โอนผ่าน QR Code</button>
                    <button class="btn btn-primary" style="padding:1rem; background: var(--primary); color: #fff;" onclick="showWallet()">💳 ชำระด้วย GB Wallet</button>
                    <button class="btn" style="padding:1rem; border:none; background:transparent; color:var(--text-muted);" onclick="closeModal()">ยกเลิก</button>
                </div>
            `;
        }

        // Expose global functions for modal inline-click handlers
        window.closeModal = closeModal;
        
        window.showAngpao = () => {
            document.getElementById('paymentModalContent').innerHTML = `
                <h3 class="text-center" style="margin-bottom: 1rem;">🧧 TrueMoney อั่งเปา</h3>
                <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1rem; text-align:center;">สร้างซองอั่งเปา TrueMoney ตามราคาสินค้าและวางลิงก์ด้านล่าง</p>
                <input type="url" id="angpaoLink" class="form-control" placeholder="https://gift.truemoney.com/campaign/?v=..." style="margin-bottom:1.5rem;">
                <div style="display:flex; flex-direction:column; gap:1rem;">
                    <button class="btn btn-primary" onclick="placeOrder('angpao')" style="padding:1rem;">ยืนยันการชำระเงิน</button>
                    <button class="btn btn-outline" style="padding:1rem;" onclick="closeModal()">กลับ</button>
                </div>
            `;
        };

        window.showQR = async () => {
            const price = document.querySelector('.price').innerText.replace('฿', '').replace(',', '');
            const qrUrl = `${API_URL}/settings/qr?amount=${price}`;
            
            document.getElementById('paymentModalContent').innerHTML = `
                <h3 class="text-center" style="margin-bottom: 1rem;">สแกน QR เพื่อชำระเงิน</h3>
                <div class="text-center" style="margin-bottom: 1.5rem;">
                    <img src="${qrUrl}" alt="QR Code พร้อมเพย์" style="width:250px; height:250px; border-radius:10px; background:#fff; padding:10px; border:2px solid var(--primary); display:inline-block;" onerror="this.onerror=null; this.src=''; this.alt='โหลด QR ไม่สำเร็จ กรุณาตรวจสอบการตั้งค่าพร้อมเพย์'">
                </div>
                <div style="display:flex; flex-direction:column; gap:1rem;">
                    <button class="btn btn-primary" onclick="placeOrder('qr')" style="padding:1rem;">ยืนยันการโอนเงิน</button>
                    <button class="btn btn-outline" style="padding:1rem;" onclick="closeModal()">ยกเลิก / กลับ</button>
                </div>
            `;
        };

        window.showWallet = async () => {
            const priceText = document.querySelector('.price').innerText.replace('฿', '').replace(/,/g, '');
            const price = parseFloat(priceText);
            try {
                const data = await apiFetch('/users/profile');
                const balance = data.user.balance || 0;

                const hasEnough = balance >= price;
                let msgHtml = hasEnough 
                    ? `<p style="color:#00ff88;">✅ ยอดเงินเพียงพอ (ราคาสินค้า: ฿${price.toLocaleString()})</p>`
                    : `<p style="color:#ff003c;">❌ ยอดเงินไม่เพียงพอ ต้องการเพิ่มอีก ฿${(price - balance).toLocaleString()}</p>`;

                document.getElementById('paymentModalContent').innerHTML = `
                    <h3 class="text-center" style="margin-bottom: 1rem;">💳 GB Wallet</h3>
                    <div style="background: rgba(255,255,255,0.05); padding: 1.5rem; text-align:center; border-radius:10px; margin-bottom:1.5rem;">
                        <p style="color:var(--text-muted); margin-bottom:0.5rem;">ยอดคงเหลือปัจจุบัน</p>
                        <h2 style="color:var(--primary); font-size:2.5rem; font-weight:800; margin-bottom:1rem;">฿${balance.toLocaleString()}</h2>
                        ${msgHtml}
                    </div>
                    <div style="display:flex; flex-direction:column; gap:1rem;">
                        <button class="btn btn-primary" onclick="placeOrder('wallet')" style="padding:1rem;" ${!hasEnough ? 'disabled' : ''}>ยืนยันการชำระเงิน</button>
                        <button class="btn btn-outline" style="padding:1rem;" onclick="closeModal()">ยกเลิก / กลับ</button>
                    </div>
                `;
            } catch (err) {
                showToast('โหลดข้อมูลวอลเล็ตไม่สำเร็จ', 'error');
            }
        };

        window.placeOrder = async (method) => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const btns = document.querySelectorAll('#paymentModalContent button');
            btns.forEach(b => b.disabled = true);

            let paymentRef = null;
            if (method === 'angpao') {
                const linkInput = document.getElementById('angpaoLink');
                if (!linkInput || !linkInput.value.includes('gift.truemoney.com')) {
                    showToast('กรุณาใส่ลิงก์อั่งเปา TrueMoney ที่ถูกต้อง', 'error');
                    btns.forEach(b => b.disabled = false);
                    return;
                }
                paymentRef = linkInput.value;
            }

            try {
                await apiFetch('/orders', {
                    method: 'POST',
                    body: JSON.stringify({ product_id: id, method: method, payment_ref: paymentRef })
                });
                showToast(method === 'meetup' ? 'นัดหมายรับสินค้าเรียบร้อย!' : 'ชำระเงินสำเร็จ!', 'success');
                
                if (method === 'meetup') {
                    window.location.href = 'dashboard.html';
                } else {
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
                }
            } catch(e) {
                showToast(e.message || 'การสั่งซื้อไม่สำเร็จ', 'error');
                btns.forEach(b => b.disabled = false);
            }
        };
    </script>
</body>
</html>
